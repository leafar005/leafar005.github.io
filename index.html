<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTFOLIO | OS_SIGNALIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="crt-overlay"></div>
    <div class="screen-container">
        
        <!-- Header / Top Bar -->
        <header class="top-bar">
            <div class="logo-left">
                SYSTEM_VERSION 5.6.1<br>
                MEMORY_ALLOC_OK
            </div>
            <div class="tabs">
                <div class="tab">RECEIVER</div>
                <div class="tab active">INVENTORY</div>
                <div class="tab">DIAGNOSTICS</div>
            </div>
            <div class="logo-right">
                <div class="lstr"><span>⛨</span> L S T R</div>
                <div>REPLIKA_ID: LEAFAR</div>
            </div>
        </header>

        <!-- Inventory Row -->
        <div class="inventory-row">
            <div class="nav-arrow">◀</div>
            <div class="slot-container" id="slot-container">
                <!-- Slots will be generated by JS -->
            </div>
            <div class="nav-arrow">▶</div>
        </div>

        <!-- Main Layout -->
        <main class="main-grid">
            
            <!-- Left Panel: Status -->
            <section class="panel panel-left">
                <div class="status-header">STATUS</div>
                <div class="profile-pic">
                    <div class="profile-placeholder"></div>
                    <div class="health">+99</div>
                </div>
                <div class="cross-box">
                    <div class="big-x">X</div>
                </div>
                <div class="slider-box">
                    <div class="slider-bg"></div>
                    <div class="slider-handle"></div>
                </div>
            </section>

            <!-- Center Panel: Viewer -->
            <section class="panel panel-center">
                <div class="viewer-content">
                    <div class="crosshairs">
                        <span class="crosshair ch-tl">+</span>
                        <span class="crosshair ch-tr">+</span>
                        <span class="crosshair ch-bl">+</span>
                        <span class="crosshair ch-br">+</span>
                    </div>
                    <div id="viewer-icon" class="big-icon-display">?</div>
                </div>
            </section>

            <!-- Right Panel: Description -->
            <section class="panel panel-right">
                <h2 id="desc-title" class="desc-title">NO DATA</h2>
                <div id="desc-text" class="desc-text">Select a module to view its specifications and memory footprint.</div>
                <a id="desc-link" href="#" class="action-btn" style="display: none;">ACCESS MODULE</a>
            </section>

        </main>

        <!-- Footer -->
        <footer class="bottom-bar">
            <div>SIGNALIS_OS v1.0.2 // LEAFAR_PORTFOLIO</div>
            <div class="bottom-controls">
                <div class="control-item"><span class="icon">✜</span> MAP</div>
                <div class="control-item"><span class="icon">⎵</span> DIAGNOSTICS</div>
                <div class="control-item"><span class="icon">◎</span> ACTION MENU</div>
                <div class="control-item"><span class="icon">⟷</span> SELECT ITEM</div>
            </div>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
